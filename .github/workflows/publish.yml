name: Publish crate

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml

permissions:
  contents: write

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect package version change
        id: version
        shell: bash
        run: |
          set -euo pipefail

          new_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          old_version=""

          if git cat-file -e "${{ github.event.before }}:Cargo.toml" 2>/dev/null; then
            old_version="$(git show "${{ github.event.before }}:Cargo.toml" | sed -n 's/^version = "\(.*\)"/\1/p' | head -n 1)"
          fi

          if [[ -n "$new_version" && "$new_version" != "$old_version" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

          echo "old_version=$old_version" >> "$GITHUB_OUTPUT"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        if: steps.version.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        if: steps.version.outputs.changed == 'true'
        run: cargo test --locked

      - name: Check package
        if: steps.version.outputs.changed == 'true'
        run: cargo publish --dry-run --locked

      - name: Publish crate
        if: steps.version.outputs.changed == 'true'
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create release tag
        if: steps.version.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          tag="v${{ steps.version.outputs.new_version }}"
          head_sha="$(git rev-parse HEAD)"

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            tag_sha="$(git rev-list -n 1 "$tag")"
            if [[ "$tag_sha" == "$head_sha" ]]; then
              echo "Tag $tag already exists on this commit."
              exit 0
            fi

            echo "Tag $tag already exists on a different commit: $tag_sha"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "refs/tags/$tag"
